name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  baseline:
    name: Baseline checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build frontend
        run: npm run build

      - name: Run quality checks
        run: npm run check

      - name: Validate Docker Compose config
        working-directory: rfi-proxy
        env:
          RFI_PROXY_SECURITY_TOKEN: ci-rfi-proxy-token
          STATISTICS_SECURITY_TOKEN: ci-statistics-token
        run: docker compose config
