<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">BelloTreno social preview</title>
  <desc id="desc">A clean light BelloTreno social preview with the original logo mark and two-color wordmark.</desc>
  <defs>
    <radialGradient id="softBg" cx="50%" cy="24%" r="78%">
      <stop offset="0%" stop-color="#edf5f8"/>
      <stop offset="55%" stop-color="#d7e3e9"/>
      <stop offset="100%" stop-color="#aebcc8"/>
    </radialGradient>
    <radialGradient id="pinkGlow" cx="0%" cy="0%" r="72%">
      <stop offset="0%" stop-color="#e8ccd5" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#e8ccd5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="100%" cy="0%" r="72%">
      <stop offset="0%" stop-color="#cde0d7" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#cde0d7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#5c6b77" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#softBg)"/>
  <rect width="1200" height="630" fill="url(#pinkGlow)"/>
  <rect width="1200" height="630" fill="url(#greenGlow)"/>

  <g filter="url(#softShadow)">
    <rect x="255" y="150" width="690" height="330" rx="40" fill="#edf3f7" fill-opacity="0.66" stroke="#ffffff" stroke-opacity="0.78"/>
  </g>

  <g transform="translate(564 181) scale(0.141)">
    <rect width="512" height="512" rx="140" fill="#6a8a9f"/>
    <path d="M 80 210 H 120  M 50 260 H 130  M 70 310 H 120" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 160 350 V 170 H 260 C 370 170, 420 250, 440 330 A 20 20 0 0 1 420 350 Z" fill="#ffffff"/>
    <path d="M 210 205 H 280 C 330 205, 355 220, 385 270 L 370 280 C 345 240, 325 225, 280 225 H 210 Z" fill="#6a8a9f"/>
    <rect x="180" y="200" width="14" height="110" rx="7" fill="#6a8a9f"/>
    <circle cx="410" cy="315" r="10" fill="#6a8a9f"/>
  </g>

  <g font-family="Outfit, Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="325" font-size="68" font-weight="850" letter-spacing="0" fill="#141b2b">Bello<tspan fill="#7899ad">Treno</tspan></text>
    <text x="600" y="374" font-size="25" font-weight="660" fill="#445061">Italian trains, stations, notices and statistics</text>
  </g>

  <g filter="url(#softShadow)" font-family="Outfit, Inter, Segoe UI, Arial, sans-serif">
    <rect x="378" y="397" width="444" height="56" rx="28" fill="#edf4f8" stroke="#ffffff" stroke-opacity="0.86"/>
    <text x="600" y="434" text-anchor="middle" font-size="21" font-weight="720" fill="#556575">Cerca treni italiani in tempo reale</text>
  </g>
</svg>
