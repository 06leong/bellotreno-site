name: Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "rfi-proxy/**"
      - ".github/workflows/docker-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rfi-proxy
            image: ghcr.io/06leong/bellotreno-rfi-proxy
            context: ./rfi-proxy
            file: ./rfi-proxy/Dockerfile
          - name: bellotreno-statistics
            image: ghcr.io/06leong/bellotreno-statistics
            context: ./rfi-proxy/statistics
            file: ./rfi-proxy/statistics/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
