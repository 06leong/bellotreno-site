<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">BelloTreno README banner</title>
  <desc id="desc">A dark project banner for BelloTreno with a high-speed train logo and railway information cards.</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M24 12v24M12 24h24" stroke="#ffffff" stroke-opacity="0.14" stroke-width="4" stroke-linecap="round"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="30" fill="#000000"/>
  <rect width="1200" height="520" rx="30" fill="url(#grid)" opacity="0.42"/>

  <g filter="url(#softShadow)">
    <rect x="70" y="70" width="1060" height="380" rx="26" fill="#000000" stroke="#ffffff" stroke-opacity="0.12"/>
  </g>

  <g transform="translate(536 82) scale(0.25)">
    <rect width="512" height="512" rx="140" fill="#6a8a9f"/>
    <path d="M 80 210 H 120  M 50 260 H 130  M 70 310 H 120" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 160 350 V 170 H 260 C 370 170, 420 250, 440 330 A 20 20 0 0 1 420 350 Z" fill="#ffffff"/>
    <path d="M 210 205 H 280 C 330 205, 355 220, 385 270 L 370 280 C 345 240, 325 225, 280 225 H 210 Z" fill="#6a8a9f"/>
    <rect x="180" y="200" width="14" height="110" rx="7" fill="#6a8a9f"/>
    <circle cx="410" cy="315" r="10" fill="#6a8a9f"/>
  </g>

  <text x="600" y="278" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="760" fill="#ffffff">
    BelloTreno
  </text>
  <text x="600" y="328" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="500" fill="#d7e1e5" opacity="0.9">
    Real-time Italian railway information
  </text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="650">
    <rect x="257" y="360" width="178" height="42" rx="21" fill="#6a8a9f" opacity="0.98"/>
    <text x="346" y="387" text-anchor="middle" fill="#ffffff">Train status</text>
    <rect x="455" y="360" width="148" height="42" rx="21" fill="#26333f" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="529" y="387" text-anchor="middle" fill="#d7e1e5">Stations</text>
    <rect x="623" y="360" width="150" height="42" rx="21" fill="#26333f" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="698" y="387" text-anchor="middle" fill="#d7e1e5">Formation</text>
    <rect x="793" y="360" width="150" height="42" rx="21" fill="#26333f" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="868" y="387" text-anchor="middle" fill="#d7e1e5">Statistics</text>
  </g>

  <path d="M90 428h1020" stroke="#ffffff" stroke-opacity="0.08"/>
</svg>
